name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      # Barrière : les tests unitaires doivent passer AVANT tout build/release.
      - name: Run unit tests
        run: ./gradlew test

      # Lint mesuré mais NON bloquant sur ce lot (abortOnError = false) ;
      # le rapport est publié en artifact pour analyse.
      - name: Lint (release)
        run: ./gradlew lintRelease

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-release-report
          path: |
            app/build/reports/lint-results-release.html
            app/build/reports/lint-results-release.xml
          if-no-files-found: warn

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > release-keystore.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=1.1.${{ github.run_number }} \
            -Pandroid.injected.signing.store.file=$(pwd)/release-keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASS \
            -Pandroid.injected.signing.key.alias=registre-release \
            -Pandroid.injected.signing.key.password=$KEY_PASS

      - name: Get build tag
        id: version
        run: echo "tag=build-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/release/app-release.apk

      - name: Clean up keystore
        if: always()
        run: rm -f release-keystore.jks
